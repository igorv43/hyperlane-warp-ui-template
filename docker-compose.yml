# Docker Compose para desenvolvimento/teste LOCAL
# Este arquivo NÃO é usado pelo EasyPanel
# O EasyPanel usa o easypanel.yml
# Use este arquivo apenas para testar localmente: docker-compose up --build

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      # NEXT_PUBLIC_* são inlined no BUILD pelo Next — passe como build args, não runtime.
      # Vazio = cai no default do .env. Sobrescreva com `NEXT_PUBLIC_X=... docker-compose up --build`.
      args:
        - NEXT_PUBLIC_REGISTRY_URL=${NEXT_PUBLIC_REGISTRY_URL:-}
        - NEXT_PUBLIC_REGISTRY_BRANCH=${NEXT_PUBLIC_REGISTRY_BRANCH:-}
        - NEXT_PUBLIC_GITHUB_PROXY=${NEXT_PUBLIC_GITHUB_PROXY:-}
        - NEXT_PUBLIC_WALLET_CONNECT_ID=${NEXT_PUBLIC_WALLET_CONNECT_ID:-}
        - NEXT_PUBLIC_ALLOWED_CHAIN_DOMAIN_IDS=${NEXT_PUBLIC_ALLOWED_CHAIN_DOMAIN_IDS:-}
        - NEXT_PUBLIC_RPC_OVERRIDES=${NEXT_PUBLIC_RPC_OVERRIDES:-}
    ports:
      - "3000:3000"
    environment:
      # Apenas runtime de verdade aqui (NEXT_PUBLIC_* NÃO funciona em runtime)
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - PORT=3000
      - HOSTNAME=0.0.0.0
    restart: unless-stopped
    # Limites de recursos (ajuste conforme necessário)
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
